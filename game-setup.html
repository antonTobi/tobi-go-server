<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Go Server - New Game</title>
    <link rel="stylesheet" href="/style.css">
    
    <!-- p5.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="setup-body">
    <div class="setup-page">
        <header class="setup-header">
            <a href="/" class="back-link">← Back to Home</a>
            <h1>New Game</h1>
        </header>
        
        <div class="setup-content">
            <!-- Board Panel (Tab 1 on mobile, left side on desktop) -->
            <div class="setup-panel board-panel active" data-panel="board">
                <div class="board-controls">
                    <div class="board-controls-row">
                        <div class="form-group">
                            <label for="board-type">Board Type</label>
                            <select id="board-type" name="boardType">
                                <option value="grid">Grid</option>
                                <option value="star">Star</option>
                                <option value="dodecagon">Dodecagon</option>
                                <option value="rotatedGrid">Rotated Grid</option>
                                <option value="hexagon">Hexagon</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="board-size">Board Size</label>
                            <div class="input-with-spinner">
                                <button type="button" id="size-decrement" class="spinner-btn">−</button>
                                <input type="text" id="board-size" name="boardSize" value="9" placeholder="e.g. 19 or 19x13">
                                <button type="button" id="size-increment" class="spinner-btn">+</button>
                            </div>
                            <span id="board-size-error" class="error-message"></span>
                        </div>
                    </div>
                    <div class="quick-size-row">
                        <button type="button" class="quick-size-btn" data-size="9">9×9</button>
                        <button type="button" class="quick-size-btn" data-size="13">13×13</button>
                        <button type="button" class="quick-size-btn" data-size="19">19×19</button>
                    </div>
                </div>
                
                <div id="preview-container"></div>
                
                <div id="stone-picker-container"></div>
            </div>
            
            <!-- Variants Panel -->
            <div class="setup-panel variants-panel active" data-panel="variants">
                <h2 class="panel-title">Game Settings</h2>
                <div id="variants-list" class="variants-list"></div>
                <div class="add-variant-wrap">
                    <button type="button" class="btn-secondary btn-add-small" id="add-variant-btn">+ Add</button>
                    <div class="add-variant-menu" id="add-variant-menu" style="display:none">
                        <button type="button" data-type="turn-order">Custom turn order</button>
                        <button type="button" data-type="setup">Setup sequence</button>
                        <button type="button" data-type="power">Power</button>
                        <button type="button" data-type="clock">Clock</button>
                        <button type="button" data-type="komi">Komi</button>
                        <button type="button" data-type="legalitycheck">Forbidden chain-size</button>
                    </div>
                </div>
                <span id="main-sequence-error" class="error-message"></span>
            </div>
        </div>
        
        <footer class="setup-footer">
            <form id="game-setup-form">
                <button type="submit" class="btn-primary btn-create">Create Game</button>
            </form>
        </footer>
    </div>
    
    <!-- Firebase configuration -->
    <script src="/firebase-config.js"></script>
    
    <!-- Vector utilities -->
    <script src="/vector.js"></script>
    
    <!-- Vector utilities -->
    <script src="/board.js"></script>
    
    <!-- Move list widget -->
    <script src="/move-list-widget.js"></script>
    
    <!-- Setup script -->
    <script src="/game-setup.js"></script>
</body>
</html>
